name: Windows Build

# Builds the Mocha.exe desktop browser and publishes it:
#   - every push to main updates the rolling "latest" prerelease, and
#   - pushing a version tag (v*) cuts a permanent, named release.
# The build is also downloadable from each run's "Artifacts" (Actions tab).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Mocha.exe (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Package (build release + assemble dist\MochaBrowser)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/package-windows.ps1

      - name: Zip the runnable folder
        shell: pwsh
        run: Compress-Archive -Path dist/MochaBrowser/* -DestinationPath dist/MochaBrowser-windows-x64.zip -Force

      - name: Upload build artifact (per-run download)
        uses: actions/upload-artifact@v4
        with:
          name: MochaBrowser-windows-x64
          path: dist/MochaBrowser
          if-no-files-found: error

      # A version tag (v1.2.3) cuts a permanent, named release.
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mocha Browser ${{ github.ref_name }}
          prerelease: false
          body: >-
            Mocha Browser ${{ github.ref_name }} — a from-scratch browser engine
            (real DNS/TCP/TLS/HTTP networking; HTML/CSS/flexbox layout and paint).
            Download `MochaBrowser-windows-x64.zip`, unzip, and run `Mocha.exe`.
            Tip: launch from a terminal with `MOCHA_NET_LOG=1` to watch the live
            network stack.
          files: |
            dist/MochaBrowser-windows-x64.zip
            dist/MochaBrowser/Mocha.exe

      # Every push to main refreshes the rolling "latest" prerelease.
      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: >-
            Automatically built from the latest commit on `main`
            (${{ github.sha }}). Download `MochaBrowser-windows-x64.zip`, unzip,
            and run `Mocha.exe`.
          files: |
            dist/MochaBrowser-windows-x64.zip
            dist/MochaBrowser/Mocha.exe

