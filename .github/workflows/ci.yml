name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: build / fmt / clippy / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Both OSes run the full gate so platform-specific behaviour (e.g. Windows
        # file:// path handling) is covered. Tests use only local files and a
        # localhost test server — no public internet.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all

      - name: Test
        run: cargo test --all

      # Milestone 20: run the stable compatibility core subset. The full suite
      # lives in tests/compat/manifest.toml; this keeps CI fast and green. Exits
      # non-zero on any unexpected failure.
      - name: Compatibility (core subset)
        run: cargo run -p mocha_compat -- tests/compat/ci-manifest.toml

      # Smoke-check the performance baseline tool runs (timings are not asserted).
      - name: Performance baseline (smoke)
        run: cargo run -p mocha_perf -- examples/layout/article.html
