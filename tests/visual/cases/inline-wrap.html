<!doctype html>
<html>
  <body>
    <style>
      .column { width: 240px; }
      .hot { color: #c0392b; }
      .cool { color: #2a6b9f; }
    </style>
    <div class="column">
      <p>
        Hello <span class="hot">red</span> and <span class="cool">blue</span>
        words share a line until the narrow column forces them to wrap.
      </p>
    </div>
  </body>
</html>
