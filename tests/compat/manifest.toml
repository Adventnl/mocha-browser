[[test]]
# These CSS features are unsupported; the cascade skips the offending stylesheet
# (a diagnostic is recorded) and the page still renders with UA defaults
# (Milestone 23 fail-open), so each case asserts the content renders.
name = "css_unsupported_media_query_skipped"
path = "css/unsupported-media-query.html"
category = "css"
expect_contains = "DrawText \"x\""

# A dynamic pseudo-class parses but is inert in a static render: the rule is
# retained, never matched, so the text renders with UA defaults (no fake state).
[[test]]
name = "css_dynamic_pseudo_class_inert"
path = "css/unsupported-pseudo-class.html"
category = "css"
expect_contains = "DrawText \"x\""

# `!important` wins over a more specific normal rule: the `<p>` is green
# (#008000) even though `#x` (red) has higher selector specificity.
[[test]]
name = "css_important_beats_specificity"
path = "css/important-beats-specificity.html"
category = "css"
expect_contains = "color=#008000"

# A matching `@media (min-width: …)` block applies: at the default 800px
# viewport the `<p>` turns green (#008000) from inside the media block.
[[test]]
name = "css_media_query_applies"
path = "css/media-query-applies.html"
category = "css"
expect_contains = "color=#008000"

# Milestone 24 selectors that now apply styling: the targeted element turns
# green (#008000), proving the selector matched.
[[test]]
name = "css_attribute_selector"
path = "css/attribute-selector.html"
category = "css"
expect_contains = "color=#008000"

