# ======================= Security =======================

# https is supported since Milestone 21; nothing listens on 127.0.0.1:1, so
# this verifies an https load reaches the real network layer and fails with a
# clear connection error (offline-safe — the connection is refused locally).
[[test]]
name = "security_https_connection_refused_is_clear"
path = "https://127.0.0.1:1/"
category = "security"
status = "unsupported"
expect_error_contains = "cannot connect"

[[test]]
name = "security_text_plain_unsupported"
path = "security/note.txt"
category = "security"
status = "unsupported"
expect_error_contains = "text/html"

[[test]]
name = "security_external_script_src_skipped"
path = "security/external-script-src.html"
category = "security"
