# Mocha Browser — Compatibility Level 1 test manifest (Milestone 20).
#
# Run with:   cargo run -p mocha_compat -- tests/compat/manifest.toml
# Re-bless:   MOCHA_BLESS=1 cargo run -p mocha_compat -- tests/compat/manifest.toml
#
# Each [[test]] renders an HTML case through mocha_engine and compares a
# normalized snapshot (mode = display | layout | devtools | form-state) against
# exactly one of: expect (a blessed file), expect_contains, or
# expect_error_contains. status defaults to "pass"; "unsupported" expects a clear
# render error; "skip"/"xfail" require a reason. See
# docs/architecture/compatibility-testing.md and compatibility-level-1.md.

