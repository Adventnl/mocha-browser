<!doctype html>
<html>
  <body>
    <style>
      body {
        color: #222222;
        background-color: #ffffff;
        font-size: 16px;
      }

      h1 {
        color: #6b3f2a;
        font-size: 36px;
        margin-bottom: 12px;
      }

      .intro {
        color: blue;
        font-size: 20px;
      }

      #highlight {
        background-color: #f2e5d7;
        padding: 12px;
        border-width: 2px;
        border-color: #6b3f2a;
      }

      div p {
        color: green;
      }
    </style>

    <h1>Styled Mocha</h1>
    <p class="intro">This paragraph is styled with a class selector.</p>
    <div id="highlight">
      <p>This paragraph is styled through a descendant selector.</p>
      <span style="color: red; font-weight: bold;">Inline style wins here.</span>
    </div>
  </body>
</html>
