<!doctype html>
<html>
  <body>
    <a id="link" href="/next.html">Click me</a>
    <script>
      let link = document.getElementById("link");
      link.addEventListener("click", function (event) {
        event.preventDefault();
        link.textContent = "Clicked without navigation";
      });
    </script>
  </body>
</html>
