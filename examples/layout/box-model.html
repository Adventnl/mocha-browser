<!doctype html>
<html>
  <body>
    <style>
      .outer {
        width: 400px;
        background-color: #eef3f7;
        padding: 16px;
        margin-bottom: 12px;
        border-width: 2px;
        border-color: #2a6b9f;
      }
      .inner {
        height: 60px;
        background-color: #ffffff;
        padding: 8px;
        border-width: 1px;
        border-color: #888888;
      }
      .label {
        color: #2a6b9f;
        font-size: 20px;
      }
    </style>

    <div class="outer">
      <p class="label">Outer box with padding, margin, and a border.</p>
      <div class="inner">
        <p>Inner box with a fixed height, its own padding, and a thin border.</p>
      </div>
    </div>
  </body>
</html>
