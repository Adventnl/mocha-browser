<!doctype html>
<html>
  <body>
    <style>
      body {
        font-size: 16px;
        color: #222222;
      }
      .column {
        width: 240px;
        background-color: #f5f5f5;
        padding: 8px;
      }
      .hot {
        color: #c0392b;
      }
      .cool {
        color: #2a6b9f;
      }
      .big {
        font-size: 28px;
      }
    </style>

    <div class="column">
      <p>
        Hello <span class="hot">red</span> and
        <span class="cool">blue</span> words share a line until the narrow two
        hundred forty pixel column forces them to wrap onto several line boxes in
        their original reading order.
      </p>
      <p>
        Normal text with a <span class="big">large</span> inline span raises the
        height of the line box that contains it.
      </p>
    </div>
  </body>
</html>
