[package]
name = "mocha_shell"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Command-line shell that wires the Mocha Browser Milestone 1 pipeline together."

[[bin]]
name = "mocha_shell"
path = "src/main.rs"

[lib]
name = "mocha_shell"
path = "src/lib.rs"

# The Milestone 1 integration test lives at the repository root (as required by
# the project layout) but is compiled and run as part of this crate.
[[test]]
name = "milestone_1_pipeline"
path = "../../tests/integration/milestone_1_pipeline.rs"

[dependencies]
mocha_error.workspace = true
mocha_url.workspace = true
mocha_html.workspace = true
mocha_style.workspace = true
mocha_layout.workspace = true
mocha_paint.workspace = true

[dev-dependencies]
mocha_dom.workspace = true
